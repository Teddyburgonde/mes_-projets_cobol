services:

  db:
    image: postgres:latest
    restart: always
    shm_size: 128mb
    env_file:
      - ../.env
    ports:
      - 5432:5432  
    volumes:
     - postgres_data:/var/lib/postgresql
  adminer:
    image: adminer
    restart: always
    ports:
     - 8080:8080

volumes:
  postgres_data:
